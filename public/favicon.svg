<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background matching sidebar brand color -->
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- Center hub node -->
  <circle cx="16" cy="16" r="3" fill="#fff"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="7"  r="2.2" fill="#fff"/>
  <circle cx="24" cy="21" r="2.2" fill="#fff"/>
  <circle cx="8"  cy="21" r="2.2" fill="#fff"/>
  <!-- Spokes connecting outer nodes to center -->
  <line x1="16" y1="9.2"  x2="16" y2="13" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="22.1" y1="19.3" x2="18.6" y2="17.2" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9.9"  y1="19.3" x2="13.4" y2="17.2" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
</svg>